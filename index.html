<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自転車交通法・速報アーカイブ</title>
    <style>
        /* 全体のデザイン（大手ニュースサイト風） */
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; color: #1c1e21; }
        header { background: #b30000; color: white; padding: 25px 15px; text-align: center; border-bottom: 5px solid #800000; position: sticky; top: 0; z-index: 100; }
        .live-badge { background: #ffcc00; color: black; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; display: inline-block; margin-bottom: 10px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* ニュースカードのデザイン */
        .news-list { display: flex; flex-direction: column; gap: 15px; }
        .news-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 6px solid #b30000; }
        .news-date { color: #d9534f; font-weight: bold; font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .news-title { font-size: 19px; font-weight: 800; margin-bottom: 12px; line-height: 1.4; color: #111; }
        .news-text { font-size: 15px; line-height: 1.7; color: #444; }
        .new-tag { color: #fff; background: #ff0000; padding: 1px 6px; border-radius: 3px; font-size: 10px; vertical-align: middle; }
        
        footer { text-align: center; padding: 40px 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="live-badge">● LIVE UPDATES</div>
    <h1 style="margin:0; font-size: 26px;">自転車交通法 速報</h1>
    <p style="margin:5px 0 0; font-size: 13px; opacity: 0.9;">法令改正・取締情報をリアルタイムに集約</p>
</header>

<div class="container">
    <div id="main-feed" class="news-list">
        </div>
</div>

<footer>
    &copy; 2026 交通法規情報センター <br>
    ※本サイトは法令情報を集約したアーカイブです。
</footer>

<script>
    /**
     * ★ニュースの追加方法★
     * 新しい情報が入ったら、一番上に以下のカタマリをコピーして貼り付けてください。
     * カンマ（ , ）を忘れずにつけてください。
     */
    const myNewsData = [
        {
            date: "2026年3月26日 15:00",
            title: "【現行犯】改正道交法施行初日の取締状況が発表",
            content: "本日より自転車のスマホ保持に対する罰則が強化されました。全国の主要交差点では午前中から警察官による集中的な指導が行われています。"
        },
        {
            date: "2026年3月25日",
            title: "明日から義務化！新しい自転車の交通ルールまとめ",
            content: "明日より施行される主な変更点は、信号無視への反則金制度導入と、酒気帯び運転の罰則引き上げです。利用者はルールの再確認をお願いします。"
        },
        {
            date: "2026年3月15日",
            title: "春の交通安全運動に合わせた自転車マナー講習会",
            content: "来月から始まる交通安全運動に先立ち、各地でヘルメット着用の重要性を伝える講習会が開催されます。"
        }
    ];

    // 画面にニュースを表示するプログラム
    const feed = document.getElementById('main-feed');
    myNewsData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'news-card';
        // 一番新しい記事にだけ「NEW」タグをつける
        const newTag = (index === 0) ? '<span class="new-tag">NEW</span>' : '';
        
        card.innerHTML = `
            <div class="news-date">${item.date} ${newTag}</div>
            <div class="news-title">${item.title}</div>
            <div class="news-text">${item.content}</div>
        `;
        feed.appendChild(card);
    });
</script>

</body>
</html>
